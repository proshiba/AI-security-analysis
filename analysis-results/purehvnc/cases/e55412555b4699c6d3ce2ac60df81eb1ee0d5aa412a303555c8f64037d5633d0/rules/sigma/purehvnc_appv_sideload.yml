title: PDF Named Excel Host Loading Adjacent AppV DLL
id: ec31833c-07a0-4cf4-a3d8-5697632ef155
status: experimental
description: Detects the reviewed PureRAT delivery chain using an Excel/AppV side load.
date: 2026-07-16
logsource:
  category: image_load
  product: windows
detection:
  selection:
    Image|endswith: '.pdf.exe'
    ImageLoaded|endswith: '\AppVIsvSubsystems64.dll'
  condition: selection
falsepositives:
  - Unusual but legitimate renamed Office diagnostics with colocated AppV components
level: high
tags:
  - attack.defense-evasion
  - attack.t1036.007
  - attack.t1574.002
