title: NetTokenBroker Persistence With Defender Exclusion
id: 198bb836-345e-4021-8e8d-cf08814376ed
status: experimental
description: Correlates the reviewed ProgramData path and Defender exclusion behavior.
date: 2026-07-16
logsource:
  category: process_creation
  product: windows
detection:
  path:
    CommandLine|contains: '\Microsoft\NetTokenBroker'
  defender:
    CommandLine|contains|all:
      - 'Add-MpPreference'
      - 'Exclusion'
  condition: path and defender
falsepositives:
  - Enterprise deployment or security-test tooling using this exact path and exclusion
level: high
tags:
  - attack.defense-evasion
  - attack.t1562.001

